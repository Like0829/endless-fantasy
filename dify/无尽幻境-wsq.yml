          \        world_msg_location = msg.get(\"location\", \"\")\n        world_msg_content\
          \ = msg.get(\"content\", \"\")\n        world_msg_player = msg.get(\"player\"\
          , \"\")\n        world_msg_player_status = msg.get(\"player_status\", \"\
          \")\n    else:\n        world_msg_location = \"\"\n        world_msg_content\
          \ = \"\"\n        world_msg_player = \"\"\n        world_msg_player_status\
          \ = \"\"\n\n    # ---- 4. 解析【数据更新】JSON（物品/位置/线索变化） ----\n    data_location\
          \ = \"\"\n    data_sub_location = \"\"\n    data_inventory = \"\"\n    data_clues\
          \ = \"\"\n    data_raw_str = \"\"\n    data_match = re.search(\n       \
          \ r'【数据更新】[：:]\\s*(\\{.*)',\n        llm_output,\n        re.DOTALL\n  \
          \  )\n    if data_match:\n        raw_data_str = data_match.group(1)\n \
          \       depth = 0\n        end_pos = 0\n        for i, ch in enumerate(raw_data_str):\n\
          \            if ch == '{':\n                depth += 1\n            elif\
          \ ch == '}':\n                depth -= 1\n                if depth == 0:\n\
