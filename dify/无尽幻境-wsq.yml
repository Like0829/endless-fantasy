          \                data_location = data_json.get(\"location\") or \"\"\n \
          \               data_sub_location = data_json.get(\"sub_location\") or \"\
          \"\n                data_inventory = data_json.get(\"inventory\") or \"\"\
          \n                data_clues = data_json.get(\"clues\") or \"\"\n      \
          \      except json.JSONDecodeError:\n                pass\n\n    # ----\
          \ 4b. 兜底：如果没找到【数据更新】标签，尝试从末尾提取JSON ----\n    if not data_raw_str:\n    \
          \    end_json_match = re.search(r'\\n(\\{.*\\})\\s*$', llm_output, re.DOTALL)\n\
          \        if end_json_match:\n            try:\n                fallback_json\
          \ = json.loads(end_json_match.group(1))\n                if any(k in fallback_json\
          \ for k in (\"location\", \"sub_location\", \"inventory\", \"clues\")):\n\
          \                    data_location = fallback_json.get(\"location\") or\
          \ \"\"\n                    data_sub_location = fallback_json.get(\"sub_location\"\
          ) or \"\"\n                    data_inventory = fallback_json.get(\"inventory\"\
          ) or \"\"\n                    data_clues = fallback_json.get(\"clues\"\
          ) or \"\"\n                    data_raw_str = end_json_match.group(1)\n\
          \            except json.JSONDecodeError:\n                pass\n\n    #\
          \ ---- 5. 校验action是否合法 ----\n    VALID_ACTIONS = [\"update_atmosphere\"\
          , \"accept_task\", \"complete_task\", \"add_message\"]\n    if world_action\
          \ and world_action not in VALID_ACTIONS:\n        need_update = False\n\
          \        world_action = \"\"\n        world_json = {}\n\n    # ---- 5. 用自己的字段重新构建干净JSON\
          \ ----\n    clean_json = {\"need_update\": need_update}\n    if world_action:\n\
          \        clean_json[\"action\"] = world_action\n    if world_task_id:\n\
          \        clean_json[\"task_id\"] = world_task_id\n    if world_player:\n\
          \        clean_json[\"player\"] = world_player\n    if world_atmosphere_change:\n\
          \        clean_json[\"atmosphere_change\"] = world_atmosphere_change\n \
          \   if world_msg_location or world_msg_content or world_msg_player:\n  \
          \      clean_json[\"message\"] = {\n            \"location\": world_msg_location,\n\
          \            \"content\": world_msg_content,\n            \"player\": world_msg_player,\n\
          \            \"player_status\": world_msg_player_status,\n        }\n  \
          \  world_json_str = json.dumps(clean_json)\n\n    # ---- 6. 从story_clean中去掉【数据更新】/【世界更新】/末尾裸JSON\
          \ ----\n    story_clean = re.sub(\n        r'\\n?【(?:数据更新|世界更新)】[：:]\\s*\\\
          {.*?\\}\\n?',\n        '',\n        llm_output,\n        flags=re.DOTALL\n\
          \    ).strip()\n    if data_raw_str:\n        story_clean = story_clean.replace(data_raw_str,\
          \ \"\").strip()\n\n    # ---- 7. 返回解析结果 ----\n    return {\n        \"hp_change\"\
          : hp_change,\n        \"san_change\": san_change,\n        \"need_update\"\
          : need_update,\n        \"world_json\": world_json,\n        \"world_json_str\"\
          : world_json_str,\n        \"world_action\": world_action,\n        \"world_task_id\"\
          : world_task_id,\n        \"world_player\": world_player,\n        \"world_atmosphere_change\"\
          : world_atmosphere_change,\n        \"world_msg_location\": world_msg_location,\n\
          \        \"world_msg_content\": world_msg_content,\n        \"world_msg_player\"\
          : world_msg_player,\n        \"world_msg_player_status\": world_msg_player_status,\n\
          \        \"data_location\": data_location,\n        \"data_sub_location\"\
          : data_sub_location,\n        \"data_inventory\": data_inventory,\n    \
          \    \"data_clues\": data_clues,\n        \"story_clean\": story_clean\n\
          \    }\n"
