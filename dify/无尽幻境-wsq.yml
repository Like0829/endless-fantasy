          \           world_json = {}\n\n    # ---- 3. 从world_json提取字段 ----\n    world_action\
          \ = world_json.get(\"action\", \"\")\n    world_task_id = world_json.get(\"\
          task_id\", \"\")\n    world_player = world_json.get(\"player\", \"\")\n\
          \    world_atmosphere_change = world_json.get(\"atmosphere_change\", 0)\n\
