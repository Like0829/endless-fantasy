    - data:
        code: "def main(hp: int, san: int, hp_change: int, san_change: int,\n    \
          \     current_location: str, current_sub_location: str,\n         current_inventory:\
          \ str, current_clues: str,\n         data_location: str, data_sub_location:\
          \ str,\n         data_inventory: str, data_clues: str) -> dict:\n    \"\"\
          \"\n    计算新的角色状态，合并数据更新\n    data_xxx 来自LLM的【数据更新】，为空字符串=不修改\n    \"\"\"\
          \n    # ---- HP/SAN计算 ----\n    new_hp = max(0, min(100, hp + hp_change))\n\
          \    new_san = max(0, min(100, san + san_change))\n    is_dead = new_hp\
          \ <= 0\n    is_crazy = new_san <= 0\n\n    # ---- 数据合并：位置/物品/线索 ----\n \
          \   # LLM在【数据更新】中输出的是完整值（非增量），\n    # 有值就用LLM的，空字符串=不修改\n    new_location\
          \ = data_location if data_location else current_location\n    new_sub_location\
          \ = data_sub_location if data_sub_location else current_sub_location\n \
          \   new_inventory = data_inventory if data_inventory else current_inventory\n\
          \    new_clues = data_clues if data_clues else current_clues\n\n    return\
          \ {\n        \"new_hp\": new_hp,\n        \"new_san\": new_san,\n      \
          \  \"is_dead\": is_dead,\n        \"is_crazy\": is_crazy,\n        \"new_location\"\
          : new_location,\n        \"new_sub_location\": new_sub_location,\n     \
          \   \"new_inventory\": new_inventory,\n        \"new_clues\": new_clues,\n\
          \    }"
