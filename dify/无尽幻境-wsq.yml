          \        status_line = status_match.group(1).strip()\n        \n       \
          \ # 提取HP变化（支持数字或骰子表达式）\n        hp_raw = re.search(r'HP:\\s*([+-]?(?:\\\
          d+|(\\d+)d(\\d+)))', status_line)\n        if hp_raw:\n            hp_str\
          \ = hp_raw.group(1)\n            if 'd' in hp_str:\n                n, m\
          \ = int(hp_raw.group(2)), int(hp_raw.group(3))\n                hp_change\
          \ = sum(_r.randint(1, m) for _ in range(n))\n                if hp_str.startswith('-'):\n\
          \                    hp_change = -hp_change\n            else:\n       \
          \         hp_change = int(hp_str)\n        \n        # 提取SAN变化\n       \
          \ san_raw = re.search(r'SAN:\\s*([+-]?(?:\\d+|(\\d+)d(\\d+)))', status_line)\n\
          \        if san_raw:\n            san_str = san_raw.group(1)\n         \
          \   if 'd' in san_str:\n                n, m = int(san_raw.group(2)), int(san_raw.group(3))\n\
          \                san_change = sum(_r.randint(1, m) for _ in range(n))\n\
          \                if san_str.startswith('-'):\n                    san_change\
          \ = -san_change\n            else:\n                san_change = int(san_str)\n\
          \n    # ---- 2. 解析【世界更新】JSON ----\n    world_match = re.search(\n      \
