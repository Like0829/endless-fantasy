    - data:
        code: "def main(player_name: str, hp: int, max_hp: int, san: int, max_san:\
          \ int,\n         strength: int, dex: int, pow: int, con: int, intelligence:\
          \ int,\n         current_location: str, current_sub_location: str,\n   \
          \      inventory: str, clues: str,\n         is_dead: bool, is_crazy: bool)\
          \ -> dict:\n    \"\"\"\n    将所有会话变量组合，生成角色状态文本\n    用于注入到LLM的系统提示词中\n  \
          \  \"\"\"\n    # 构建技能值（基于属性计算）\n    # 每个技能 = 基础值 + 属性加成，上限99%\n    skills\
          \ = {\n        \"侦察\": min(99, 25 + intelligence * 5),\n        \"聆听\":\
          \ min(99, 20 + pow * 5),\n        \"图书馆使用\": min(99, 20 + intelligence *\
          \ 5),\n        \"神秘学\": min(99, 5 + pow * 5),\n        \"潜行\": min(99, 20\
          \ + dex * 5),\n        \"说服\": min(99, 15 + pow * 5),\n        \"格斗\": min(99,\
          \ 20 + (strength + dex) * 2),\n        \"闪避\": min(99, dex * 4),\n     \
          \   \"急救\": min(99, 10 + intelligence * 4 + dex * 2),\n        \"追踪\": min(99,\
          \ 10 + intelligence * 4 + pow * 2),\n    }\n\n    # 构建完整角色数据对象\n    role_state\
          \ = {\n        \"player_name\": player_name,\n        \"hp\": hp,\n    \
          \    \"max_hp\": max_hp,\n        \"san\": san,\n        \"max_san\": max_san,\n\
          \        \"strength\": strength,\n        \"dex\": dex,\n        \"pow\"\
          : pow,\n        \"con\": con,\n        \"intelligence\": intelligence,\n\
          \        \"current_location\": current_location,\n        \"current_sub_location\"\
          : current_sub_location,\n        \"inventory\": inventory,\n        \"clues\"\
          : clues,\n        \"is_dead\": is_dead,\n        \"is_crazy\": is_crazy,\n\
          \        \"skills\": skills\n    }\n\n    # 计算HP/SAN状态描述（用//代替int()避免参数名int冲突）\n\
          \    hp_pct = hp * 100 // max_hp if max_hp > 0 else 0\n    san_pct = san\
          \ * 100 // max_san if max_san > 0 else 0\n\n    if hp_pct > 70:\n      \
          \  hp_status = \"健康\"\n    elif hp_pct > 40:\n        hp_status = \"轻伤\"\
          \n    elif hp_pct > 20:\n        hp_status = \"重伤\"\n    else:\n       \
          \ hp_status = \"濒死\"\n\n    if san_pct > 70:\n        san_status = \"稳定\"\
          \n    elif san_pct > 40:\n        san_status = \"不安\"\n    elif san_pct\
          \ > 20:\n        san_status = \"恍惚\"\n    else:\n        san_status = \"\
          濒临崩溃\"\n\n    # 格式化技能列表文本\n    skill_lines = \"\\n\".join([f\"  - {k}: {v}%\"\
          \ for k, v in skills.items()])\n\n    # 子场景（如果非空）\n    sub_loc_line = f\"\
          子场景：{current_sub_location}\" if current_sub_location else \"\"\n\n    #\
          \ 构建最终的可读文本\n    role_state_text = f\"\"\"===== 角色状态 =====\n玩家名称：{player_name}\n\
          ━━━━━━━━━━━━━━━━\n【生命值】HP: {hp}/{max_hp}（{hp_status}）\n【理智值】SAN: {san}/{max_san}（{san_status}）\n\
          ━━━━━━━━━━━━━━━━\n【属性】\n  力量(STR): {strength}  敏捷(DEX): {dex}\n  意志(POW):\
          \ {pow}  体质(CON): {con}\n  智力(INT): {intelligence}\n━━━━━━━━━━━━━━━━\n【技能】\n\
          {skill_lines}\n━━━━━━━━━━━━━━━━\n当前位置：{current_location}\n{sub_loc_line}\n\
          携带物品：{inventory}\n已发现线索：{clues if clues else \"无\"}\n死亡状态：{\"是\" if is_dead\
          \ else \"否\"}\n疯狂状态：{\"是\" if is_crazy else \"否\"}\n=====================\"\
          \"\"\n\n    return {\n        \"role_state\": role_state,\n        \"role_state_text\"\
          : role_state_text,\n        \"current_location\": current_location\n   \
          \ }"
        code_language: python3
